{% extends "base.html" %}

{% set title = "首页 - ToCU" %}

{% block body %}
<section class="tocu-home-cover">

    <h1 class="tocu-home-cover__title">ToCU</h1>
    <div class="tocu-home-links">
      <a href="{{ url_for('programs') }}" class="tocu-home-links__card">
