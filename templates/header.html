<header class="bg-white border-b border-slate-200 sticky top-0 z-30">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between gap-4">
    <a href="{{ url_for('index') }}" class="text-lg font-semibold text-brand-700">港中文申请一站式助手</a>

    <div class="flex items-center gap-5">
      <nav class="hidden md:flex items-center gap-5 text-sm">
        <a href="{{ url_for('index') }}" class="{% if request.path == '/' %}text-brand-700 font-semibold{% else %}text-slate-600 hover:text-brand-700{% endif %}">首页</a>
        <a href="{{ url_for('programs') }}" class="{% if request.path.startswith('/programs') %}text-brand-700 font-semibold{% else %}text-slate-600 hover:text-brand-700{% endif %}">专业速查</a>

        <div class="relative group">
          <a href="{{ url_for('guide_list') }}" class="{% if request.path.startswith('/guide') %}text-brand-700 font-semibold{% else %}text-slate-600 hover:text-brand-700{% endif %}">操作步骤</a>
          <div class="hidden group-hover:block group-focus-within:block absolute left-0 mt-2 w-72 rounded-xl border border-slate-200 bg-white shadow-lg p-2 z-50">
            <p class="px-3 py-2 text-xs text-slate-500">快速跳转阶段</p>
            {% for stage in stage_nav_items %}
              <a href="{{ url_for('guide', stage_slug=stage.slug) }}" class="block rounded-lg px-3 py-2 text-sm text-slate-700 hover:bg-slate-50">
                {{ stage.month }} · {{ stage.title }}
              </a>
            {% endfor %}
          </div>
        </div>

        <a href="{{ url_for('faq_list') }}" class="{% if request.path.startswith('/faq') %}text-brand-700 font-semibold{% else %}text-slate-600 hover:text-brand-700{% endif %}">常见问题</a>
        <a href="{{ url_for('assistant') }}" class="{% if request.path.startswith('/assistant') %}text-brand-700 font-semibold{% else %}text-slate-600 hover:text-brand-700{% endif %}">智能助手</a>
      </nav>

      <div class="relative group">
        <button class="w-9 h-9 rounded-full text-white text-sm font-semibold {{ avatar_colors[current_user.avatar_seed] }}">
          {{ current_user.initial }}
        </button>

        <div class="hidden group-hover:block group-focus-within:block absolute right-0 mt-2 w-72 bg-white border border-slate-200 rounded-xl shadow-lg p-4 z-50">
          <p class="text-sm font-medium text-slate-900">当前用户：{{ current_user.name }}</p>
          <p class="text-xs text-slate-500 mt-1">这里演示 Session：昵称和头像色会被记住。</p>

          <form action="{{ url_for('update_profile') }}" method="post" class="mt-3 space-y-3">
            <input
              type="text"
              name="user_name"
              value="{{ current_user.name if current_user.name != '游客' else '' }}"
              placeholder="输入昵称（默认游客）"
              maxlength="20"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm"
            >

            <select name="avatar_seed" class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm">
              {% for seed in ['sky', 'emerald', 'amber', 'rose', 'violet'] %}
                <option value="{{ seed }}" {% if current_user.avatar_seed == seed %}selected{% endif %}>头像色：{{ seed }}</option>
              {% endfor %}
            </select>

            <button type="submit" class="w-full rounded-lg bg-brand-600 text-white py-2 text-sm">保存</button>
          </form>

          <form action="{{ url_for('reset_profile') }}" method="post" class="mt-2">
            <button type="submit" class="w-full rounded-lg border border-slate-300 py-2 text-sm text-slate-700">恢复默认</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div class="md:hidden border-t border-slate-100 px-4 py-2">
    <div class="flex items-center justify-between text-xs">
      <a href="{{ url_for('index') }}" class="text-slate-600">首页</a>
      <a href="{{ url_for('programs') }}" class="text-slate-600">专业</a>
      <a href="{{ url_for('guide_list') }}" class="text-slate-600">步骤</a>
      <a href="{{ url_for('faq_list') }}" class="text-slate-600">FAQ</a>
      <a href="{{ url_for('assistant') }}" class="text-slate-600">助手</a>
    </div>
  </div>
</header>
